<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coregrid</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    >

    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand text-primary fs-4 fw-bold" href="#">Coregrid</a>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link active" aria-current="page" href="#">Дэшборд</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container-fluid p-4">
      <div class="row gap-2">
        <div class="card text-center col" style="width: 18rem;">
          <div class="card-body">
            <h5 class="card-title">Продажы</h5>
            <p class="card-text fs-1 fw-bold">0 тг</p>
          </div>
        </div>
        <div class="card text-center col" style="width: 18rem;">
          <div class="card-body">
            <h5 class="card-title">Продаж сделано</h5>
            <p class="card-text fs-1 fw-bold">0</p>
          </div>
        </div>
        <div class="card text-center col bg-warning-subtle" style="width: 18rem;">
          <div class="card-body">
            <h5 class="card-title">Мало остатков</h5>
            <p class="card-text fs-1 fw-bold">0</p>
          </div>
        </div>
        <div class="card text-center col bg-danger-subtle" style="width: 18rem;">
          <div class="card-body">
            <h5 class="card-title">Нет на складе</h5>
            <p class="card-text fs-1 fw-bold">0</p>
          </div>
        </div>

      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    >
    </script>
  </body>
</html>
